services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: viteezy-node
    container_name: viteezy_node
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  python:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: viteezy-python
    container_name: viteezy_python
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHON_ENV=production
    restart: unless-stopped